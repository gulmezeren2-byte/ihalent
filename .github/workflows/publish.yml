name: Publish to PyPI

# Manual trigger only, for now. The PyPI release is published with a token;
# once ihalent is configured as a PyPI Trusted Publisher (Project → Publishing →
# GitHub, workflow "publish.yml"), switch this back to `on: release` and every
# release will ship itself with no token.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish
