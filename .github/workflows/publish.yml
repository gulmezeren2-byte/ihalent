name: Release

# Publishes to PyPI when a version tag (e.g. v0.4.0) is pushed, using PyPI
# Trusted Publishing (OIDC) — no API token is stored anywhere. The trusted
# publisher is configured at
# https://pypi.org/manage/project/ihalent/settings/publishing/
# (owner: gulmezeren2-byte, repo: ihalent, workflow: publish.yml).

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
